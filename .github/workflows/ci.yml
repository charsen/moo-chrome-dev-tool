name: CI

# 仓库主在 Gitee；这套 yaml 同样适用于 mirror 到 GitHub 的副本。
# 仅在 GitHub 跑时生效。Gitee Go 用户可手动改写为 .workflow/*.yaml。

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Version consistency (manifest / CHANGELOG / docs)
        run: pnpm check:versions

      - name: Type check (TypeScript + Vue)
        run: pnpm type-check

      - name: Type check (tests, 宽松版)
        run: pnpm type-check:tests
        continue-on-error: true  # 测试代码累积类型债，warn-only 不阻塞 master push

      - name: Unit tests
        run: pnpm test

      - name: Build (produces dist/)
        run: pnpm build

      - name: Bundle size check
        run: pnpm check:bundle-size

      - name: Dependency audit (warn-only)
        run: pnpm audit --audit-level high || echo "::warning::pnpm audit 报 high 漏洞，请评估"
        continue-on-error: true  # high 漏洞 warn，不挡 CI；human 评估是否真影响用户运行

      # 不上传 artifact —— dist/ 由本地 pnpm release 流程产出；CI 这里仅做"能 build"验证。

  e2e:
    # 并行跑（不 needs: test）—— 跑 13 个 Playwright case，真起 chromium + 真加载 dist 当扩展
    # 加载扩展必须 launchPersistentContext + --headless=new；headless 老模式装不了扩展
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Playwright chromium (+ Linux 系统依赖)
        run: pnpm exec playwright install --with-deps chromium

      - name: Build + E2E (13 case)
        run: pnpm test:e2e

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
