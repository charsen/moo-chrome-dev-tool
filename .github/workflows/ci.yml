name: CI

# 仓库主在 Gitee；这套 yaml 同样适用于 mirror 到 GitHub 的副本。
# 仅在 GitHub 跑时生效。Gitee Go 用户可手动改写为 .workflow/*.yaml。

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Type check (TypeScript + Vue)
        run: pnpm type-check

      - name: Unit tests
        run: pnpm test

      - name: Build (produces dist/)
        run: pnpm build

      # 不上传 artifact —— dist/ 由本地 pnpm release 流程产出；CI 这里仅做"能 build"验证。
