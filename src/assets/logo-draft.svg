<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    moo-chrome-dev-tool logo 草图 v4
    v3 → v4 思路:
    - 改用 Bezier 曲线（Q/C），告别多边形质感
    - 减法: 3 片大羽毛（不是 5 片乱发）
    - 凸出明显的眉骨悬岩 → 凹进眼窝 → 凸出钩喙，这一段是「鹰脸」的核心
    - 钩喙做成清楚的 J: 锐角下伸→曲线勾回

    配色: BG #2a2a2a / 鹰 #0d0d0d / 金 #f4b400
  -->

  <circle cx="256" cy="256" r="248" fill="#2a2a2a"/>

  <!--
    鹰头剪影（朝左前方），按顺时针走:
    起点: 后脑顶
    → 3 片羽毛（短-长-中，朝后倾）
    → 额头平滑下降
    → 眉骨突出（凸 bump）
    → 眼窝凹陷（凹 notch）
    → 鼻梁下降
    → J 钩喙：尖端 + 勾回
    → 下颌斜线后收
    → 颈底
    → 后颈曲线上升回起点
  -->
  <path d="
    M 432 180
    C 428 130 410 92 380 88
    C 360 88 348 120 332 152

    C 322 130 312 78 285 75
    C 258 75 248 115 235 152

    C 225 120 208 90 188 95
    C 170 100 160 138 158 168

    C 158 180 154 195 162 210
    Q 178 222 168 232
    Q 145 248 118 252
    Q 90 258 70 278

    C 50 295 32 318 28 335
    Q 38 348 62 342
    Q 88 332 110 332

    C 130 340 155 365 195 382
    C 250 400 318 410 372 408
    C 412 405 432 388 438 360

    C 442 320 438 275 432 235
    C 430 215 432 195 432 180
    Z
  " fill="#0d0d0d"/>

  <!-- 鹰眼 + reticle 准星（在眉骨下方的凹陷里） -->
  <g transform="translate(148, 238)">
    <circle r="32" fill="#f4b400"/>
    <circle r="32" fill="none" stroke="#0d0d0d" stroke-width="2.5"/>

    <line x1="-30" y1="0" x2="-11" y2="0" stroke="#0d0d0d" stroke-width="4" stroke-linecap="round"/>
    <line x1="11"  y1="0" x2="30"  y2="0" stroke="#0d0d0d" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="-30" x2="0" y2="-11" stroke="#0d0d0d" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="11"  x2="0" y2="30"  stroke="#0d0d0d" stroke-width="4" stroke-linecap="round"/>

    <circle r="6.5" fill="#0d0d0d"/>
    <circle r="2" fill="#f4b400"/>
  </g>
</svg>
